<div class="flex flex-col w-full h-full justify-center items-center gap-4">
  <div class="card flex flex-col justify-center gap-3 w-80 p-4" [formGroup]="loginForm">
    <div class="flex flex-col items-center gap-1">
      <h1 class="text-2xl font-semibold">Authentication</h1>
      <p class="text-sm text-gray-500">Sign in to continue</p>
    </div>
    <p-iftalabel class="w-full">
      <input
        fluid
        pInputText
        id="username"
        formControlName="usernameValue"
        autocomplete="off"
        placeholder="Username"
      />
      <label for="username">Username</label>
    </p-iftalabel>

    <p-iftalabel class="w-full">
      <p-password
        fluid
        id="password"
        formControlName="passwordValue"
        autocomplete="off"
        placeholder="Password"
        [feedback]="false"
        [toggleMask]="true"
      />
      <label for="password">Password</label>
    </p-iftalabel>

    <p-button fluid label="Login" (onClick)="login()" [disabled]="loginForm.invalid" />
  </div>
</div>
